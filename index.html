<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ScaleSnap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="control-panel">
        <div class="brand">
          <h1>ScaleSnap</h1>
          <p>Calibrate once, then measure anywhere on your image.</p>
        </div>

        <section class="panel-card">
          <h2>1) Upload Image</h2>
          <label class="file-input-wrap" for="imageInput">
            <span>Choose image</span>
          </label>
          <div class="muted">Or paste an image with Ctrl+V.</div>
          <input id="imageInput" type="file" accept="image/*" />
          <div id="imageInfo" class="muted">No image loaded</div>
        </section>

        <section class="panel-card">
          <h2>2) Calibrate Scale</h2>
          <div class="row">
            <label for="knownLength">Known length</label>
            <input id="knownLength" type="number" min="0" step="any" placeholder="e.g. 100" />
          </div>
          <div class="row">
            <label for="knownUnit">Unit</label>
            <select id="knownUnit">
              <option value="mm">mm</option>
              <option value="cm" selected>cm</option>
              <option value="m">m</option>
              <option value="in">in</option>
              <option value="ft">ft</option>
            </select>
          </div>
          <button id="startCalibration" class="btn ghost">Reset calibration points</button>
          <div id="calibrationStatus" class="muted">Scale is not calibrated yet.</div>
        </section>

        <section class="panel-card">
          <h2>3) Measure</h2>
          <label class="check-row" for="twoPointMode">
            <input id="twoPointMode" type="checkbox" checked />
            <span>Use 2-point measurements only</span>
          </label>
          <label class="check-row" for="areaMode">
            <input id="areaMode" type="checkbox" />
            <span>Measure area (cm^2, in^2, etc.)</span>
          </label>
          <div class="button-row">
            <button id="startMeasure" class="btn" disabled>Start measuring</button>
            <button id="clearPoints" class="btn ghost" disabled>Clear points</button>
            <button id="finishArea" class="btn ghost" disabled hidden>Finish area</button>
          </div>
          <div id="measureStatus" class="muted">Calibration required before measuring.</div>
        </section>

        <section class="panel-card history-card">
          <div class="results-head">
            <h2>Results</h2>
            <button id="clearResults" class="icon-btn" type="button" aria-label="Clear results" title="Clear results">
              <i class="fa-regular fa-trash-can" aria-hidden="true"></i>
            </button>
          </div>
          <ul id="resultsList"></ul>
        </section>
      </aside>

      <main class="canvas-panel">
        <div class="top-overlay-controls">
          <div id="modeBadge" class="mode-badge">Idle</div>
          <div id="zoomControls" class="zoom-controls" hidden>
            <button id="zoomOutBtn" class="zoom-btn" type="button" aria-label="Zoom out">-</button>
            <div id="zoomPercent" class="zoom-percent" aria-live="polite">100%</div>
            <button id="zoomInBtn" class="zoom-btn" type="button" aria-label="Zoom in">+</button>
          </div>
        </div>
        <div id="mobileScrollWrap" class="mobile-scroll-wrap" hidden>
          <input
            id="mobileScrollRange"
            class="mobile-scroll-range"
            type="range"
            min="0"
            max="0"
            step="1"
            value="0"
            aria-label="Image scroll slider"
          />
        </div>
        <canvas id="measureCanvas" aria-label="Image measurement canvas"></canvas>
        <div class="hint-bar" id="hintBar">
          Upload an image to begin.
        </div>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
